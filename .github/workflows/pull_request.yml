name: Run Test

on:
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest  # where the job will execute on
    # steps to perform
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Grant execute permissions for gradlew
        run: chmod +x gradlew

      - name: Run unit Test
        run: ./gradlew clean testDebug
